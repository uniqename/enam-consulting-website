<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917"/>
      <stop offset="50%" style="stop-color:#292524"/>
      <stop offset="100%" style="stop-color:#1c1917"/>
    </linearGradient>
    <linearGradient id="emerald2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg2)"/>
  <rect width="1584" height="396" fill="url(#dots)"/>

  <!-- Emerald top bar -->
  <rect x="0" y="0" width="1584" height="6" fill="url(#emerald2)"/>

  <!-- Large decorative D (Doxa) -->
  <text x="1300" y="340" font-family="Georgia, serif" font-size="400" font-weight="bold" fill="rgba(255,255,255,0.025)" letter-spacing="-20">D</text>

  <!-- Left content -->
  <!-- Tagline top -->
  <text x="100" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#10b981" font-weight="700" letter-spacing="4">OPEN TO PRODUCT OWNER &amp; PM OPPORTUNITIES</text>

  <!-- Name -->
  <text x="96" y="196" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#ffffff" letter-spacing="-2">Enam Egyir</text>

  <!-- Subtitle -->
  <text x="100" y="240" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.65)">Founder · Product Owner · GRC Consultant · App Developer</text>

  <!-- Accent line -->
  <rect x="100" y="262" width="500" height="2" fill="url(#emerald2)" rx="1"/>

  <!-- Three value props -->
  <!-- 1 -->
  <circle cx="116" cy="308" r="16" fill="rgba(5,150,105,0.15)" stroke="rgba(5,150,105,0.4)" stroke-width="1"/>
  <text x="116" y="314" font-family="Georgia, serif" font-size="14" fill="#10b981" text-anchor="middle" font-weight="bold">1</text>
  <text x="144" y="314" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.7)">Boardroom-to-backlog product strategy</text>

  <!-- 2 -->
  <circle cx="116" cy="348" r="16" fill="rgba(5,150,105,0.15)" stroke="rgba(5,150,105,0.4)" stroke-width="1"/>
  <text x="116" y="354" font-family="Georgia, serif" font-size="14" fill="#10b981" text-anchor="middle" font-weight="bold">2</text>
  <text x="144" y="354" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.7)">3 products shipped 0→1 as sole Product Owner</text>

  <!-- 3 -->
  <circle cx="116" cy="388" r="16" fill="rgba(5,150,105,0.15)" stroke="rgba(5,150,105,0.4)" stroke-width="1"/>
  <text x="116" y="394" font-family="Georgia, serif" font-size="14" fill="#10b981" text-anchor="middle" font-weight="bold">3</text>
  <text x="144" y="394" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.7)">10+ years · Chase · Target · Comerica · Huntington</text>

  <!-- Vertical divider -->
  <rect x="780" y="80" width="1" height="280" fill="rgba(255,255,255,0.07)"/>

  <!-- Right — certifications block -->
  <text x="840" y="128" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="3" font-weight="700">CREDENTIALS</text>

  <!-- Cert cards -->
  <rect x="840" y="144" width="320" height="52" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="868" y="165" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="700">PMP® Certified</text>
  <text x="868" y="186" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Project Management Professional</text>

  <rect x="840" y="208" width="320" height="52" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="868" y="229" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="700">Certified Scrum Master</text>
  <text x="868" y="250" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Agile Certified Practitioner</text>

  <rect x="840" y="272" width="320" height="52" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="868" y="293" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="700">MS Data Science</text>
  <text x="868" y="314" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Regis University, Denver CO</text>

  <rect x="840" y="336" width="320" height="52" rx="10" fill="rgba(5,150,105,0.1)" stroke="rgba(5,150,105,0.3)" stroke-width="1"/>
  <text x="868" y="357" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#10b981" font-weight="700">RSA Archer Certified</text>
  <text x="868" y="378" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">GRC Platform Professional</text>

  <!-- Signature -->
  <text x="1472" y="56" font-family="Georgia, serif" font-size="20" fill="rgba(5,150,105,0.5)" text-anchor="end" font-style="italic">— Enam Egyir</text>

  <!-- Website -->
  <text x="1472" y="388" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.25)" text-anchor="end" letter-spacing="1">consulting.homelinkgh.com</text>
</svg>
