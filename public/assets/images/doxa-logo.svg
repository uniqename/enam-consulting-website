<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 178" width="320" height="178">
  <defs>

    <!-- Gold shimmer: light edge → deep bronze → warm gold → deep bronze → light edge -->
    <linearGradient id="gs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D4AA58"/>
      <stop offset="25%"  stop-color="#8B6C26"/>
      <stop offset="50%"  stop-color="#C8A44A"/>
      <stop offset="75%"  stop-color="#8B6C26"/>
      <stop offset="100%" stop-color="#D4AA58"/>
    </linearGradient>

    <!-- Sage jewel gradient: deep → pale, bottom to top -->
    <linearGradient id="sg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#8AAE8A" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#C6D9C0" stop-opacity="0.22"/>
    </linearGradient>

  </defs>

  <!-- Paper-warm cream background -->
  <rect width="320" height="178" fill="#F7F2EA"/>

  <!-- ─── MARK  center x=160, baseline y=98 ─── -->

  <!-- Sage fill: the jewel inside Arc 3 -->
  <path d="M 143 98 A 17 17 0 0 0 177 98 Z" fill="url(#sg)"/>

  <!-- Arc 4 — innermost whisper, r=8 -->
  <path d="M 152 98 A 8 8 0 0 0 168 98"
        fill="none" stroke="url(#gs)" stroke-width="0.65" stroke-linecap="butt"/>

  <!-- Arc 3 — r=17 -->
  <path d="M 143 98 A 17 17 0 0 0 177 98"
        fill="none" stroke="url(#gs)" stroke-width="0.88" stroke-linecap="butt"/>

  <!-- Arc 2 — r=36 -->
  <path d="M 124 98 A 36 36 0 0 0 196 98"
        fill="none" stroke="url(#gs)" stroke-width="0.88" stroke-linecap="butt"/>

  <!-- Arc 1 — outermost, r=55 -->
  <path d="M 105 98 A 55 55 0 0 0 215 98"
        fill="none" stroke="url(#gs)" stroke-width="0.88" stroke-linecap="butt"/>

  <!-- Crown band — base line -->
  <line x1="105" y1="98" x2="215" y2="98"
        stroke="url(#gs)" stroke-width="0.75"/>

  <!-- Diamond accents at band endpoints -->
  <rect x="103" y="96" width="4" height="4" fill="#C9A44A"
        transform="rotate(45, 105, 98)"/>
  <rect x="213" y="96" width="4" height="4" fill="#C9A44A"
        transform="rotate(45, 215, 98)"/>

  <!-- Foot dots — where inner arcs meet the band -->
  <circle cx="124" cy="98" r="1.3" fill="#C9A44A"/>
  <circle cx="196" cy="98" r="1.3" fill="#C9A44A"/>
  <circle cx="143" cy="98" r="1.0" fill="#C9A44A"/>
  <circle cx="177" cy="98" r="1.0" fill="#C9A44A"/>

  <!-- Crown apex dots — each arc's highest point -->
  <circle cx="160" cy="43" r="2.8" fill="#C9A44A"/>
  <circle cx="160" cy="62" r="2.0" fill="#C9A44A"/>
  <circle cx="160" cy="81" r="1.4" fill="#8AAE8A"/>
  <circle cx="160" cy="90" r="0.9" fill="#8AAE8A"/>

  <!-- ─── WORDMARK with flanking rules ─── -->

  <!-- Rule above -->
  <line x1="76" y1="122" x2="244" y2="122"
        stroke="#C9A44A" stroke-width="0.5" opacity="0.6"/>

  <!-- DOXA & CO -->
  <text
    x="160" y="145"
    font-family="Georgia,'Times New Roman',serif"
    font-size="26" font-weight="400"
    fill="#8B7030"
    letter-spacing="9"
    text-anchor="middle"
  >DOXA &amp; CO</text>

  <!-- Rule below -->
  <line x1="76" y1="155" x2="244" y2="155"
        stroke="#C9A44A" stroke-width="0.5" opacity="0.6"/>

</svg>
