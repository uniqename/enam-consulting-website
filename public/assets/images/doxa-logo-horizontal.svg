<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 52" width="268" height="52">
  <defs>
    <linearGradient id="gh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D4AA58"/>
      <stop offset="25%"  stop-color="#8B6C26"/>
      <stop offset="50%"  stop-color="#C8A44A"/>
      <stop offset="75%"  stop-color="#8B6C26"/>
      <stop offset="100%" stop-color="#D4AA58"/>
    </linearGradient>
    <linearGradient id="sh" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#8AAE8A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C6D9C0" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Mark: center x=26, baseline y=40, radii: 22/14/6 -->

  <!-- Sage jewel -->
  <path d="M 20 40 A 6 6 0 0 0 32 40 Z" fill="url(#sh)"/>

  <!-- Arc 3 r=6 -->
  <path d="M 20 40 A 6 6 0 0 0 32 40"
        fill="none" stroke="url(#gh)" stroke-width="0.75" stroke-linecap="butt"/>

  <!-- Arc 2 r=14 -->
  <path d="M 12 40 A 14 14 0 0 0 40 40"
        fill="none" stroke="url(#gh)" stroke-width="0.85" stroke-linecap="butt"/>

  <!-- Arc 1 r=22 -->
  <path d="M 4 40 A 22 22 0 0 0 48 40"
        fill="none" stroke="url(#gh)" stroke-width="0.85" stroke-linecap="butt"/>

  <!-- Base line -->
  <line x1="4" y1="40" x2="48" y2="40"
        stroke="url(#gh)" stroke-width="0.7"/>

  <!-- Diamond endpoints -->
  <rect x="2" y="38" width="4" height="4" fill="#C9A44A"
        transform="rotate(45, 4, 40)"/>
  <rect x="46" y="38" width="4" height="4" fill="#C9A44A"
        transform="rotate(45, 48, 40)"/>

  <!-- Foot dots -->
  <circle cx="12" cy="40" r="1.1" fill="#C9A44A"/>
  <circle cx="40" cy="40" r="1.1" fill="#C9A44A"/>
  <circle cx="20" cy="40" r="0.8" fill="#C9A44A"/>
  <circle cx="32" cy="40" r="0.8" fill="#C9A44A"/>

  <!-- Apex dots: 40-22=18, 40-14=26, 40-6=34 -->
  <circle cx="26" cy="18" r="2.0" fill="#C9A44A"/>
  <circle cx="26" cy="26" r="1.4" fill="#C9A44A"/>
  <circle cx="26" cy="34" r="0.9" fill="#8AAE8A"/>

  <!-- Separator -->
  <line x1="64" y1="9" x2="64" y2="44"
        stroke="#C8BAA0" stroke-width="0.7"/>

  <!-- Wordmark -->
  <text x="76" y="28"
        font-family="Georgia,'Times New Roman',serif"
        font-size="19" font-weight="400"
        fill="#8B7030" letter-spacing="5">DOXA &amp; CO</text>

  <!-- Rule below wordmark -->
  <line x1="76" y1="36" x2="262" y2="36"
        stroke="#C9A44A" stroke-width="0.45" opacity="0.55"/>

  <!-- Tagline -->
  <text x="77" y="46"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="7.5" font-weight="700"
        letter-spacing="3.2" fill="#059669">STRATEGY · PRODUCT · DELIVERY</text>

</svg>
