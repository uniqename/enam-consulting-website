<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" rx="18" fill="#1c1917"/>

  <!-- Base line -->
  <line x1="38" y1="118" x2="142" y2="118"
        stroke="#C9A44A" stroke-width="5"/>

  <!-- Diamond endpoints -->
  <rect x="36" y="116" width="4" height="4" fill="#C9A44A"
        transform="rotate(45, 38, 118)"/>
  <rect x="140" y="116" width="4" height="4" fill="#C9A44A"
        transform="rotate(45, 142, 118)"/>

  <!-- Arc 1 r=52 (outermost) -->
  <path d="M 38 118 A 52 52 0 0 0 142 118"
        fill="none" stroke="#C9A44A" stroke-width="9" stroke-linecap="round"/>

  <!-- Arc 2 r=34 -->
  <path d="M 56 118 A 34 34 0 0 0 124 118"
        fill="none" stroke="#C9A44A" stroke-width="7" stroke-linecap="round"/>

  <!-- Arc 3 r=16 -->
  <path d="M 74 118 A 16 16 0 0 0 106 118"
        fill="none" stroke="#C9A44A" stroke-width="6" stroke-linecap="round"/>

  <!-- Arc 4 r=7 (innermost) -->
  <path d="M 83 118 A 7 7 0 0 0 97 118"
        fill="none" stroke="#C9A44A" stroke-width="5" stroke-linecap="round"/>

  <!-- Foot dots -->
  <circle cx="56"  cy="118" r="5" fill="#C9A44A"/>
  <circle cx="124" cy="118" r="5" fill="#C9A44A"/>
  <circle cx="74"  cy="118" r="4" fill="#C9A44A"/>
  <circle cx="106" cy="118" r="4" fill="#C9A44A"/>

  <!-- Apex dots -->
  <circle cx="90" cy="66"  r="7" fill="#C9A44A"/>
  <circle cx="90" cy="84"  r="5.5" fill="#C9A44A"/>
  <circle cx="90" cy="102" r="4" fill="#8AAE8A"/>
  <circle cx="90" cy="111" r="3" fill="#8AAE8A"/>

</svg>
