<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="gi" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D4AA58"/>
      <stop offset="25%"  stop-color="#8B6C26"/>
      <stop offset="50%"  stop-color="#C8A44A"/>
      <stop offset="75%"  stop-color="#8B6C26"/>
      <stop offset="100%" stop-color="#D4AA58"/>
    </linearGradient>
    <linearGradient id="si" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#8AAE8A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C6D9C0" stop-opacity="0.22"/>
    </linearGradient>
  </defs>

  <rect width="180" height="180" fill="#F7F2EA"/>

  <!-- Mark: center x=90, baseline y=118, radii: 52/34/16/7 -->

  <!-- Sage jewel fill -->
  <path d="M 74 118 A 16 16 0 0 0 106 118 Z" fill="url(#si)"/>

  <!-- Arc 4 r=7 -->
  <path d="M 83 118 A 7 7 0 0 0 97 118"
        fill="none" stroke="url(#gi)" stroke-width="0.7" stroke-linecap="butt"/>

  <!-- Arc 3 r=16 -->
  <path d="M 74 118 A 16 16 0 0 0 106 118"
        fill="none" stroke="url(#gi)" stroke-width="1.0" stroke-linecap="butt"/>

  <!-- Arc 2 r=34 -->
  <path d="M 56 118 A 34 34 0 0 0 124 118"
        fill="none" stroke="url(#gi)" stroke-width="1.0" stroke-linecap="butt"/>

  <!-- Arc 1 r=52 -->
  <path d="M 38 118 A 52 52 0 0 0 142 118"
        fill="none" stroke="url(#gi)" stroke-width="1.0" stroke-linecap="butt"/>

  <!-- Base line -->
  <line x1="38" y1="118" x2="142" y2="118"
        stroke="url(#gi)" stroke-width="0.8"/>

  <!-- Diamond endpoints -->
  <rect x="36" y="116" width="4" height="4" fill="#C9A44A"
        transform="rotate(45, 38, 118)"/>
  <rect x="140" y="116" width="4" height="4" fill="#C9A44A"
        transform="rotate(45, 142, 118)"/>

  <!-- Foot dots -->
  <circle cx="56"  cy="118" r="1.4" fill="#C9A44A"/>
  <circle cx="124" cy="118" r="1.4" fill="#C9A44A"/>
  <circle cx="74"  cy="118" r="1.0" fill="#C9A44A"/>
  <circle cx="106" cy="118" r="1.0" fill="#C9A44A"/>

  <!-- Apex dots: 118-52=66, 118-34=84, 118-16=102, 118-7=111 -->
  <circle cx="90" cy="66"  r="2.8" fill="#C9A44A"/>
  <circle cx="90" cy="84"  r="2.0" fill="#C9A44A"/>
  <circle cx="90" cy="102" r="1.4" fill="#8AAE8A"/>
  <circle cx="90" cy="111" r="0.9" fill="#8AAE8A"/>

</svg>
