<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ibg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#ibg)"/>

  <!-- Delta mark in white — centered in 64x64 -->
  <!-- Outer triangle: apex (32,10), BL (8,52), BR (56,52) -->
  <polygon points="32,10 56,52 8,52" fill="white"/>
  <!-- Inner cutout — same as background color at midpoint (#04966A approx) -->
  <polygon points="32,20 46,44 18,44" fill="#059669"/>
  <!-- Center dot -->
  <circle cx="32" cy="34" r="5" fill="white"/>
</svg>
