[build]
  command = "npm install && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Optimize build for production
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.images]
  compress = true

# Cache assets for 1 year (immutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 1 month
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Cache fonts for 1 year
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML - no cache (always fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Privacy policy redirects for app store compliance
[[redirects]]
  from = "/beacon/privacy"
  to = "/beacon/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/homelinkgh/privacy"
  to = "/homelinkgh/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/homelinkgh/privacy-policy.html"
  to = "/homelinkgh/privacy-policy.html"
  status = 200
  force = false

[[redirects]]
  from = "/faithklinik/privacy"
  to = "/faithklinik/privacy-policy.html"
  status = 200

# Ensure static HTML files for Faith Klinik are served directly (not intercepted by SPA catch-all)
[[redirects]]
  from = "/faithklinik/privacy-policy.html"
  to = "/faithklinik/privacy-policy.html"
  status = 200
  force = false

[[redirects]]
  from = "/faithklinik/support.html"
  to = "/faithklinik/support.html"
  status = 200
  force = false

[[redirects]]
  from = "/faithklinik/account/delete.html"
  to = "/faithklinik/account/delete.html"
  status = 200
  force = false
