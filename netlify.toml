[build]
  command = "yarn install && yarn build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

# Privacy policy redirects for app store compliance
[[redirects]]
  from = "/beacon/privacy"
  to = "/beacon/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/homelinkgh/privacy"
  to = "/homelinkgh/privacy/index.html"
  status = 200

[[redirects]]
  from = "/faithklinik/privacy"
  to = "/faithklinik/privacy-policy.html"
  status = 200
